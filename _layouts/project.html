---
layout: default
---

<section class="project-hero">
  <div class="project-hero-content">
    <a href="{{ '/en/projects/' | relative_url }}" class="project-back">
      {% if page.lang == 'nl' %}← Terug naar Projecten{% else %}← Back to Projects{% endif %}
    </a>
    <p class="section-tag">{{ page.category }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.summary }}</p>
    <div class="project-hero-meta">
      {% for tag in page.tags %}
        <span class="project-tag">{{ tag }}</span>
      {% endfor %}
    </div>
  </div>
</section>

<div class="project-body">
  {{ content }}
</div>
