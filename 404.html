---
permalink: /404.html
layout: default
title: Page Not Found
---

<style>
  .not-found {
    min-height: calc(100vh - 65px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10rem 3rem 7rem;
    position: relative;
    overflow: hidden;
  }
  .not-found::before {
    content: '404';
    position: absolute;
    font-family: var(--font-head);
    font-size: clamp(12rem, 30vw, 22rem);
    font-weight: 800;
    color: var(--gray-light);
    letter-spacing: -0.05em;
    line-height: 1;
    z-index: 0;
    user-select: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
  }
  .not-found-content {
    position: relative;
    z-index: 1;
  }
  .not-found-tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: var(--accent);
    padding: 0.3rem 1rem;
    border-radius: 2rem;
    color: var(--navy);
    margin-bottom: 1.25rem;
  }
  .not-found h1 {
    font-family: var(--font-head);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--navy);
    margin-bottom: 1rem;
    line-height: 1.1;
  }
  .not-found h1 em { font-style: normal; color: var(--gray); }
  .not-found p {
    font-size: 1.05rem;
    color: var(--gray);
    font-weight: 300;
    line-height: 1.7;
    max-width: 420px;
    margin: 0 auto 2.5rem;
  }
  .not-found-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  @media (max-width: 600px) {
    .not-found-actions { flex-direction: column; align-items: center; }
  }
</style>

<div class="not-found">
  <div class="not-found-content reveal">
    <div class="not-found-tag">404</div>
    <h1 id="nf-heading">Page <em>not found</em></h1>
    <p id="nf-body">The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
    <div class="not-found-actions">
      <a id="nf-home" href="/en/" class="btn-primary">Back to Home</a>
      <a id="nf-contact" href="/en/contact/" class="btn-secondary">Get in Touch</a>
    </div>
  </div>
</div>

<script>
  (function() {
    var isNL = window.location.pathname.indexOf('/nl/') === 0
            || document.referrer.indexOf('/nl/') !== -1;

    if (isNL) {
      document.getElementById('nf-heading').innerHTML = 'Pagina <em>niet gevonden</em>';
      document.getElementById('nf-body').textContent = 'De pagina die je zoekt bestaat niet of is verplaatst. Laten we je weer op weg helpen.';
      document.getElementById('nf-home').textContent = 'Terug naar Home';
      document.getElementById('nf-home').href = '/nl/';
      document.getElementById('nf-contact').textContent = 'Neem Contact Op';
      document.getElementById('nf-contact').href = '/nl/contact/';
    }
  })();
</script>
